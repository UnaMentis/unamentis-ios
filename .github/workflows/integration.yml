name: Integration Tests

# Focused workflow: integration tests (audio pipeline, barge-in, etc.). These
# build the same heavy app and are slow/hardware-oriented, so they run nightly
# and on demand, NOT on every push (pushes are gated by Unit + Lint + Hook).
# test-ci.sh handles pre-boot + watchdog/retry.
on:
  schedule:
    - cron: '0 8 * * *'   # nightly, 08:00 UTC
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: macos-15
    timeout-minutes: 40

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode*.app' -type d | sort -V | tail -1)"
        echo "Selected Xcode: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH"
        xcodebuild -version

    - name: Install xcbeautify and XcodeGen
      run: brew install xcbeautify xcodegen

    - name: Cache SPM packages
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Create placeholder model files
      run: |
        # The tracked `models` entry is a symlink to a developer-local path
        # that does not exist on CI runners. Remove it before creating a real
        # directory tree of empty placeholder files for the build.
        if [ -L models ]; then rm models; fi
        mkdir -p models
        touch models/llama-3.2-3b-instruct-q4_k_m.gguf
        touch models/ministral-3b-instruct-q4_k_m.gguf
        touch models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

        mkdir -p models/Models/voices
        touch models/Models/model.safetensors
        touch models/Models/tokenizer.model
        touch models/Models/voices/alba.safetensors
        touch models/Models/voices/marius.safetensors
        touch models/Models/voices/jean.safetensors
        touch models/Models/voices/fantine.safetensors
        touch models/Models/voices/cosette.safetensors
        touch models/Models/voices/eponine.safetensors
        touch models/Models/voices/javert.safetensors
        touch models/Models/voices/azelma.safetensors
        echo "Created placeholder model files for CI build"

    - name: Cache llama.xcframework (b9821)
      uses: actions/cache@v4
      with:
        path: UnaMentis/Frameworks/llama.xcframework
        key: llama-xcframework-b9821

    - name: Fetch llama.xcframework
      run: |
        # llama.xcframework is a large binary, gitignored and "downloaded
        # separately" (see .gitignore). OnDeviceLLMService does `import llama`
        # unconditionally, so the build needs it. Fetch the official b9821 build,
        # which includes the gemma4 architecture (b7263 did not), so Gemma 4 E2B
        # loads on-device. Recent releases ship the asset as .zip (older ones used
        # .tar.gz). Cached across runs by the step above.
        set -euo pipefail
        FW="UnaMentis/Frameworks/llama.xcframework"
        if [ -d "$FW" ] && [ -f "$FW/Info.plist" ]; then
          echo "llama.xcframework present (cache hit), skipping download"
          exit 0
        fi
        mkdir -p UnaMentis/Frameworks
        curl -fsSL -o /tmp/llama-xcf.zip \
          https://github.com/ggml-org/llama.cpp/releases/download/b9821/llama-b9821-xcframework.zip
        mkdir -p /tmp/llama-xcf && unzip -q /tmp/llama-xcf.zip -d /tmp/llama-xcf
        XCF="$(find /tmp/llama-xcf -name llama.xcframework -type d | head -1)"
        rm -rf "$FW"
        mv "$XCF" "$FW"
        echo "Installed llama.xcframework b9821"

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Resolve Simulator
      id: sim
      run: |
        for name in "iPhone 17 Pro" "iPhone 16 Pro" "iPhone 15 Pro" "iPhone 14 Pro"; do
          if xcrun simctl list devices available 2>/dev/null | grep -q "$name"; then
            echo "simulator=$name" >> "$GITHUB_OUTPUT"
            echo "Using simulator: $name"
            exit 0
          fi
        done
        FALLBACK=$(xcrun simctl list devices available 2>/dev/null | grep -o 'iPhone [^(]*' | head -1 | xargs)
        echo "simulator=$FALLBACK" >> "$GITHUB_OUTPUT"
        echo "Using fallback simulator: $FALLBACK"

    - name: Run Integration Tests
      run: |
        CI=true \
        TEST_TYPE=integration \
        SIMULATOR="${{ steps.sim.outputs.simulator }}" \
        ENABLE_COVERAGE=false \
        ENFORCE_COVERAGE=false \
        RESULT_BUNDLE_PATH=IntegrationTestResults.xcresult \
        XCBEAUTIFY_RENDERER=github-actions \
        ./scripts/test-ci.sh

    - name: Upload Integration Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: IntegrationTestResults.xcresult
        retention-days: 7

    - name: Summary
      if: always()
      run: |
        echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "IntegrationTestResults.xcresult" ]; then
          xcrun xcresulttool get --path IntegrationTestResults.xcresult --format json 2>/dev/null | \
            python3 -c "
        import json, sys
        try:
            data = json.load(sys.stdin)
            metrics = data.get('metrics', {})
            tests = metrics.get('testsCount', {}).get('_value', 'N/A')
            failures = metrics.get('testsFailedCount', {}).get('_value', '0')
            print(f'| Metric | Value |')
            print(f'|--------|-------|')
            print(f'| Tests Run | {tests} |')
            print(f'| Failures | {failures} |')
            print(f'| Status | {\"Passed\" if failures == \"0\" or failures == 0 else \"Failed\"} |')
        except:
            print('Could not parse test results')
        " >> $GITHUB_STEP_SUMMARY || echo "Could not parse xcresult" >> $GITHUB_STEP_SUMMARY
        else
          echo "No test results found" >> $GITHUB_STEP_SUMMARY
        fi
