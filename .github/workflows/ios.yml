name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        required: false
        default: false
        type: boolean

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Install linting tools
      run: brew install swiftlint swiftformat

    - name: SwiftLint
      run: swiftlint lint --strict --reporter github-actions-logging

    - name: SwiftFormat Check
      run: swiftformat --lint .

    - name: Summary
      if: always()
      run: |
        echo "## Lint Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| SwiftLint | ${{ job.status == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| SwiftFormat | ${{ job.status == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY

  hook-audit:
    name: Hook Bypass Detection
    runs-on: macos-15
    timeout-minutes: 15
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 15

    - name: Install linting tools
      run: brew install swiftlint

    - name: Detect Hook Bypasses
      run: ./scripts/hook-audit.sh --detect

    - name: Summary
      if: always()
      run: |
        echo "## Hook Bypass Detection" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Checked recent commits for potential hook bypasses." >> $GITHUB_STEP_SUMMARY
        echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    timeout-minutes: 40

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode*.app' -type d | sort -V | tail -1)"
        echo "Selected Xcode: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH"
        xcodebuild -version

    - name: Install xcbeautify and XcodeGen
      run: brew install xcbeautify xcodegen

    - name: Cache SPM packages
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Create placeholder model files
      run: |
        # The tracked `models` entry is a symlink to a developer-local path
        # that does not exist on CI runners. Remove it before creating a real
        # directory tree of empty placeholder files for the build.
        if [ -L models ]; then rm models; fi
        mkdir -p models
        touch models/llama-3.2-3b-instruct-q4_k_m.gguf
        touch models/ministral-3b-instruct-q4_k_m.gguf
        touch models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

        mkdir -p models/Models/voices
        touch models/Models/model.safetensors
        touch models/Models/tokenizer.model
        touch models/Models/voices/alba.safetensors
        touch models/Models/voices/marius.safetensors
        touch models/Models/voices/jean.safetensors
        touch models/Models/voices/fantine.safetensors
        touch models/Models/voices/cosette.safetensors
        touch models/Models/voices/eponine.safetensors
        touch models/Models/voices/javert.safetensors
        touch models/Models/voices/azelma.safetensors
        echo "Created placeholder model files for CI build"

    - name: Cache llama.xcframework (b7263)
      uses: actions/cache@v4
      with:
        path: UnaMentis/Frameworks/llama.xcframework
        key: llama-xcframework-b7263

    - name: Fetch llama.xcframework
      run: |
        # llama.xcframework is a ~467MB binary, gitignored and "downloaded
        # separately" (see .gitignore). OnDeviceLLMService does `import llama`
        # unconditionally, so the build needs it. Fetch the official b7263 build
        # (the exact one project.yml targets). Cached across runs by the step above.
        set -euo pipefail
        FW="UnaMentis/Frameworks/llama.xcframework"
        if [ -d "$FW" ] && [ -f "$FW/Info.plist" ]; then
          echo "llama.xcframework present (cache hit), skipping download"
          exit 0
        fi
        mkdir -p UnaMentis/Frameworks
        curl -fsSL -o /tmp/llama-xcf.tar.gz \
          https://github.com/ggml-org/llama.cpp/releases/download/b7263/llama-b7263-xcframework.tar.gz
        mkdir -p /tmp/llama-xcf && tar -xzf /tmp/llama-xcf.tar.gz -C /tmp/llama-xcf
        XCF="$(find /tmp/llama-xcf -name llama.xcframework -type d | head -1)"
        rm -rf "$FW"
        mv "$XCF" "$FW"
        echo "Installed llama.xcframework b7263"

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Resolve Simulator
      id: sim
      run: |
        for name in "iPhone 17 Pro" "iPhone 16 Pro" "iPhone 15 Pro" "iPhone 14 Pro"; do
          if xcrun simctl list devices available 2>/dev/null | grep -q "$name"; then
            echo "simulator=$name" >> "$GITHUB_OUTPUT"
            echo "Using simulator: $name"
            exit 0
          fi
        done
        FALLBACK=$(xcrun simctl list devices available 2>/dev/null | grep -o 'iPhone [^(]*' | head -1 | xargs)
        echo "simulator=$FALLBACK" >> "$GITHUB_OUTPUT"
        echo "Using fallback simulator: $FALLBACK"

    - name: Build
      run: |
        set -o pipefail
        xcodebuild build \
          -scheme UnaMentis \
          -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.simulator }}' \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          | xcbeautify --renderer github-actions

    # COVERAGE_THRESHOLD is a ratchet, not the goal. The extraction bug that
    # read the Watch App target (always 0%) and skipped enforcement is fixed,
    # so this gate is now real. Measured UnaMentis.app line coverage is ~12%
    # as of 2026-06 (up from ~2.3% as more code gained tests); the threshold is
    # set just below measured to lock in the gain. Raise it as coverage grows
    # toward the 80% target. Keep this in sync with the pre-commit hook.
    - name: Run Unit Tests
      id: coverage
      run: |
        CI=true \
        TEST_TYPE=unit \
        SIMULATOR="${{ steps.sim.outputs.simulator }}" \
        ENABLE_COVERAGE=true \
        ENFORCE_COVERAGE=true \
        COVERAGE_THRESHOLD=10 \
        RESULT_BUNDLE_PATH=UnitTestResults.xcresult \
        XCBEAUTIFY_RENDERER=github-actions \
        ./scripts/test-ci.sh

    - name: Install xcresultparser
      run: brew install xcresultparser

    - name: Convert coverage to Cobertura XML
      if: always()
      run: |
        if [ -d "UnitTestResults.xcresult" ]; then
          xcresultparser \
            --output-format cobertura \
            "UnitTestResults.xcresult" > coverage.xml
          echo "Coverage report generated:"
          head -20 coverage.xml
        else
          echo "No xcresult bundle found, skipping coverage conversion"
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        flags: ios
        fail_ci_if_error: false

    - name: Upload Unit Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: UnitTestResults.xcresult
        retention-days: 7

    - name: Summary
      if: always()
      run: |
        echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "UnitTestResults.xcresult" ]; then
          xcrun xcresulttool get --path UnitTestResults.xcresult --format json 2>/dev/null | \
            python3 -c "
        import json, sys
        try:
            data = json.load(sys.stdin)
            metrics = data.get('metrics', {})
            tests = metrics.get('testsCount', {}).get('_value', 'N/A')
            failures = metrics.get('testsFailedCount', {}).get('_value', '0')
            print(f'| Metric | Value |')
            print(f'|--------|-------|')
            print(f'| Tests Run | {tests} |')
            print(f'| Failures | {failures} |')
            print(f'| Coverage | ${{ steps.coverage.outputs.coverage }}% |')
            print(f'| Status | {\"Passed\" if failures == \"0\" or failures == 0 else \"Failed\"} |')
        except:
            print('Could not parse test results')
        " >> $GITHUB_STEP_SUMMARY || echo "Could not parse xcresult" >> $GITHUB_STEP_SUMMARY
        else
          echo "No test results found" >> $GITHUB_STEP_SUMMARY
        fi

  integration-tests:
    name: Integration Tests
    runs-on: macos-15
    timeout-minutes: 40
    if: github.ref == 'refs/heads/main' || github.event.inputs.run_integration == 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode*.app' -type d | sort -V | tail -1)"
        echo "Selected Xcode: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH"
        xcodebuild -version

    - name: Install xcbeautify and XcodeGen
      run: brew install xcbeautify xcodegen

    - name: Cache SPM packages
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Create placeholder model files
      run: |
        # The tracked `models` entry is a symlink to a developer-local path
        # that does not exist on CI runners. Remove it before creating a real
        # directory tree of empty placeholder files for the build.
        if [ -L models ]; then rm models; fi
        mkdir -p models
        touch models/llama-3.2-3b-instruct-q4_k_m.gguf
        touch models/ministral-3b-instruct-q4_k_m.gguf
        touch models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

        mkdir -p models/Models/voices
        touch models/Models/model.safetensors
        touch models/Models/tokenizer.model
        touch models/Models/voices/alba.safetensors
        touch models/Models/voices/marius.safetensors
        touch models/Models/voices/jean.safetensors
        touch models/Models/voices/fantine.safetensors
        touch models/Models/voices/cosette.safetensors
        touch models/Models/voices/eponine.safetensors
        touch models/Models/voices/javert.safetensors
        touch models/Models/voices/azelma.safetensors
        echo "Created placeholder model files for CI build"

    - name: Cache llama.xcframework (b7263)
      uses: actions/cache@v4
      with:
        path: UnaMentis/Frameworks/llama.xcframework
        key: llama-xcframework-b7263

    - name: Fetch llama.xcframework
      run: |
        # llama.xcframework is a ~467MB binary, gitignored and "downloaded
        # separately" (see .gitignore). OnDeviceLLMService does `import llama`
        # unconditionally, so the build needs it. Fetch the official b7263 build
        # (the exact one project.yml targets). Cached across runs by the step above.
        set -euo pipefail
        FW="UnaMentis/Frameworks/llama.xcframework"
        if [ -d "$FW" ] && [ -f "$FW/Info.plist" ]; then
          echo "llama.xcframework present (cache hit), skipping download"
          exit 0
        fi
        mkdir -p UnaMentis/Frameworks
        curl -fsSL -o /tmp/llama-xcf.tar.gz \
          https://github.com/ggml-org/llama.cpp/releases/download/b7263/llama-b7263-xcframework.tar.gz
        mkdir -p /tmp/llama-xcf && tar -xzf /tmp/llama-xcf.tar.gz -C /tmp/llama-xcf
        XCF="$(find /tmp/llama-xcf -name llama.xcframework -type d | head -1)"
        rm -rf "$FW"
        mv "$XCF" "$FW"
        echo "Installed llama.xcframework b7263"

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Resolve Simulator
      id: sim
      run: |
        for name in "iPhone 17 Pro" "iPhone 16 Pro" "iPhone 15 Pro" "iPhone 14 Pro"; do
          if xcrun simctl list devices available 2>/dev/null | grep -q "$name"; then
            echo "simulator=$name" >> "$GITHUB_OUTPUT"
            echo "Using simulator: $name"
            exit 0
          fi
        done
        FALLBACK=$(xcrun simctl list devices available 2>/dev/null | grep -o 'iPhone [^(]*' | head -1 | xargs)
        echo "simulator=$FALLBACK" >> "$GITHUB_OUTPUT"
        echo "Using fallback simulator: $FALLBACK"

    - name: Build
      run: |
        set -o pipefail
        xcodebuild build \
          -scheme UnaMentis \
          -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.simulator }}' \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          | xcbeautify --renderer github-actions

    - name: Run Integration Tests
      run: |
        CI=true \
        TEST_TYPE=integration \
        SIMULATOR="${{ steps.sim.outputs.simulator }}" \
        ENABLE_COVERAGE=false \
        ENFORCE_COVERAGE=false \
        RESULT_BUNDLE_PATH=IntegrationTestResults.xcresult \
        XCBEAUTIFY_RENDERER=github-actions \
        ./scripts/test-ci.sh

    - name: Upload Integration Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: IntegrationTestResults.xcresult
        retention-days: 7

    - name: Summary
      if: always()
      run: |
        echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "IntegrationTestResults.xcresult" ]; then
          xcrun xcresulttool get --path IntegrationTestResults.xcresult --format json 2>/dev/null | \
            python3 -c "
        import json, sys
        try:
            data = json.load(sys.stdin)
            metrics = data.get('metrics', {})
            tests = metrics.get('testsCount', {}).get('_value', 'N/A')
            failures = metrics.get('testsFailedCount', {}).get('_value', '0')
            print(f'| Metric | Value |')
            print(f'|--------|-------|')
            print(f'| Tests Run | {tests} |')
            print(f'| Failures | {failures} |')
            print(f'| Status | {\"Passed\" if failures == \"0\" or failures == 0 else \"Failed\"} |')
        except:
            print('Could not parse test results')
        " >> $GITHUB_STEP_SUMMARY || echo "Could not parse xcresult" >> $GITHUB_STEP_SUMMARY
        else
          echo "No test results found" >> $GITHUB_STEP_SUMMARY
        fi
