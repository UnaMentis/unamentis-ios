# Codecov Configuration for UnaMentis iOS
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true

flags:
  ios:
    paths:
      - UnaMentis/
    carryforward: true

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true
  hide_project_coverage: false

github_checks:
  annotations: true

ignore:
  # Debug-only code
  - "UnaMentis/UI/Debug/**"
  # Test harness infrastructure
  - "UnaMentis/Testing/**"
  # App entry point
  - "UnaMentis/UnaMentisApp.swift"
  # Pure SwiftUI views with no business logic
  - "UnaMentis/UI/Settings/DiscoveryProgressView.swift"
  - "UnaMentis/UI/Settings/OnDeviceLLMSettingsView.swift"
  - "UnaMentis/UI/Settings/QRCodeScannerView.swift"
  - "UnaMentis/UI/Settings/ServerSettingsView.swift"
  - "UnaMentis/UI/ReadingList/ReadingListView.swift"
